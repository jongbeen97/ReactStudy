<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <title>Document</title>
</head>
<body>
    <script type="text/babel">
        /** @type {any} */
        const globalWindow = window;
        const { React, ReactDOM } = globalWindow;
    </script>

    <div id="root1"></div>
    <script type="text/babel" >
        // jsx를 이용한 element 만들기 
        /** @type {React.ReactElement} */
        const h1Element = <h1>Hello World</h1>; // 직접 실행되지 않고, Babel 등의 트랜스파일러에 의해서 React.createElement()로 변환뒤 실행됩니다. 

        /** @type {HTMLElement} */
        const root1 = document.getElementById('root1');
        ReactDOM.createRoot(root1).render(h1Element);

    </script>

    <hr/>
    <div id="root2"></div>
    <script type="text/babel">
        // 여러 태그를 단일 태그로 구성 
        const div1 = <React.Fragment>
                <div>안녕하세요</div>
                <div>반갑습니다 홍명보입니다 </div>
            </React.Fragment>
        const div2 = <>
            <div>Hello</div>
            <div>I'm Sonny i'm attack for MyungBo</div>
        </>
            /** @type {HTMLElement} */
        const root2 = document.getElementById('root2');
        ReactDOM.createRoot(root2).render([div1, div2]);

    </script>
    <hr/>
    <div id="root3"></div>
    <script type="text/babel">

        // JSX 표현식과 주석 : 중괄호 {} 사용 
        
        /** @type {number} */
        const radius = 3.5; // 타입스크립트에서는 number라는 타입을가진다. 

        /** @type {React.ReactElement} */
        const circle = <>
            <p id="radius">반지름 : {radius}</p> 
            <p id="area">넓이 : {Math.PI * Math.pow(radius, 2)}</p>
            { // 이런 식으로 형태를 잡아주면 주석이 된다. 
                // 슬래시 2개 : (single line comment)는 중괄호와 다른 줄에 작성합니다.  
                }
        </> 
        // 표현식을 나타낼 때 중괄호를 사용해서 나타낼 수 있다. 
        // Math.pow : 제곱 , 세제곱 이런 것도 만들 수 있다. 이는 JSX 내부에서 가능하다. 
        // jsx 는 여러개 사용하려면 fragment 로 묶을것이다. 묶어서 표시를 하는 것, 이게 JSX 내부 영역이다. 여기서 사용을 하는 것이다. 벗어나서 사용하면 안됨 
        // JSX 내부에 주석을 달 것이다. 일단은 넓이를 밑에다 할 것이다. 중괄호를 펼쳐준 다음에 // 를 하면 된다. 



    /** @type {HTMLElement} */
    const root3 = document.getElementById('root3');
    ReactDOM.createRoot(root3).render(circle);

    </script>
    <hr/>

    <div id="root4"></div>
    <script type="text/babel">

        // JSX 에서는 반드시 셀프 클로징시 슬래시 (/)를 붙여야 한다 
        // <hr/> <input type="text"/> 등
        /** @type {React.ReactElement} */ 
        const inputElement = <input type="text"/>


            /** @type {HTMLElement} */
    const root4 = document.getElementById('root4');
    ReactDOM.createRoot(root4).render(inputElement);

    </script>

<hr/>
    <div id="root5"></div>
    <script type="text/babel">
        // 논리연산자 + 삼항연산자를 활용한 조건부 랜더링 
        
        /** @type {boolean}*/
        const condition = false;

        // 조건문 랜더링 
        /** @type {React.ReactElement} */
        const conditionElement = (
            <>
                { condition ? <h1>true</h1> : <h1>false</h1> }
                { condition && <h1>나는 나오나요? (안나옴) </h1> } 
                { condition || <h1>나는 나오나요? (나옴) </h1> }
            </>
        ) // 이런 문법을 통해 가독성을 높여줄 수있음 ( ()를 사용할 수 있다 . ) 
            // { condition && <h1>나는 나오나요?</h1> } 뒤가 false 이면 당연히 안나옵니다 
            // 만약에 or 표기법으로 한다면 이건 나온다. 

                    /** @type {HTMLElement} */
    const root5 = document.getElementById('root5');
    ReactDOM.createRoot(root5).render(conditionElement);

    </script>
</body>
</html>
