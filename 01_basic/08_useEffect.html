<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <title>Document</title>
</head>
<body>
    <script type="text/babel">
  /** @type {any} */
  const globalWindow = window;
  const { React, ReactDOM } = globalWindow;
</script>


<div id="root1"></div>
<div id="root2"></div>
<div id="root3"></div>
<script type="text/babel" >

  // 1. 의존 배열이 없는 경우 
  /** @type {React.FC} */
   const CurrentTime1 = ()=>{

  // 현재 시간을 State 로 관리 
  /** @type {[string, (value: string) => void]}*/
    const [currentTime, setCurrentTime] = React.useState(new Date().toLocaleTimeString());
    // useEffect 
    React.useEffect(()=>{
      alert(currentTime);
    })

    // 버튼 클릭 이벤트 핸들러 (시간 확인할 때 누르는 버튼)
    /** @param {React.MouseEvent<HTMLButtonElement>} e */
      const handleClick = (e) => {
        setCurrentTime(new Date().toLocaleTimeString())
      }
      return (
        <button onClick={handleClick}>현재시간 확인</button>
      )
  }
  // ReactDOM.createRoot(document.getElementById('root1')).render(<CurrentTime1/>)

  // 2. 의존 배열이 비어 있는 경우 

  /**
   * @typeof {Object} User
   * @property {number} id
   * @property {string} name
   * @property {string} email
   */

   /** @type {React.FC} */
   const UserList = () =>{

      // 상태 정의 (User[], 로딩 여부)
      const [users, setUsers] = React.useState([]);

      // 로딩 여부를 파악하는 True false 데이터 
      const [loading, setLoading] = React.useState(true);

      // 최초 랜더링 시 User[] 가져와서 상태 users에 저장, 로딩 완료 처리 
      React.useEffect(() => {
        
        // API 요청 
        fetch('https://jsonplaceholder.typicode.com/users') // 사용자 목록이 오도록 설정을 함. 
          .then(response => response.json()) // 리스폰스의 JSON을 꺼내서 가져와라 
          .then(json =>{
            setUsers(json);
            setLoading(false); // 로딩 완료 처리 
          }) 
          .catch(error => {
            console.error('데이터 로드 실패 : ',error);
            setLoading(false); // 로딩 실패시 나오는 것. 
          })
      } , []); // 의존 배열이 비어 있어 최초 1회만 네트워크 요청을 한다. 


      // 조건 부 랜더링 
      if (loading){ // data를 아직 가져오지 않았다면 ,
        return <h1>데이터 가져오는 중...</h1>
      }
      
      // 정상 return 인 경우 
      return (
        <>
          <h1>사용자 목록</h1>
          <ul>
            {
              users.map(user => (
                // 실무 패턴 : <UserItemList key={} user={user}/>
                <li key={user.id}>
                  <h3> 이름 : {user.name} </h3> 
                  <p> 이메일 : {user.email} </p>
                </li>
              ))
            }  
          </ul>
        </>
      )
}
  //ReactDOM.createRoot(document.getElementById('root2')).render(<UserList/>)


  // 3. 의존 배열이 값을 가진 경우 : 최초 랜더링 and 값이 변하는 경우 동작 

  const PostList = () =>{

    // 상태 (Post[], 로딩 여부, Page 정보 3가지 상태 관리)
    const [ posts, setPosts ] = React.useState([]); // Post 상태
    const [ loading, setLoading ] = React.useState(true); // 로딩 정보
    const [ page, setPage ] = React.useState(1);  // 페이지 정보

    // API 요청 ( 최초 랜더링 , 페이지 변할 때 API 요청 )
    React.useEffect(()=>{
      fetch(`https://jsonplaceholder.typicode.com/posts?_page=${page}`)
        .then(response => response.json())
        .then(json => {
          setPosts(json);
          setLoading(false);
        })
        .catch(error =>{
          console.error('데이터 로드 실패 : ', error);
          setLoading(false);
        })
    } , [page]) // page 변화가 추적이 되면 API 요청 

    // return 삼항 연산자 조건부 렌더링 
    return (
      <>
        <h1>게시글 목록(현재 {page}페이지)</h1>
        {
          loading ? (
            <h1>데이터 가져오는 중...</h1>
          ) : (
            <ul>
              {
                posts.map(post => (
                  <li key={post.id}>
                   <h3>제목 : {post.title}</h3>
                   <p>본문 : {post.body}</p>
                  </li>
                ))
              }  
            </ul>
          )
        }
        <div>
          <button onClick={() => setPage(page - 1)} disabled={page === 1}>이전 페이지</button>
          <button onClick={() => setPage(page + 1)} disabled={page === 10}>다음 페이지</button>
        </div>
      </>
    );

  }
    ReactDOM.createRoot(document.getElementById('root3')).render(<PostList/>)

  
</script>

</body>
</html>
